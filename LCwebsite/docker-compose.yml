services:
  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  web:
    build: .
    ports:
      - "8000:8000"
    restart: always
    shm_size: '2gb'
    env_file:
      - .env
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis
    command: daphne -b 0.0.0.0 -p 8000 LCwebsite.asgi:application

  worker:
    build: .
    command: celery -A LCwebsite worker -l info
    env_file:
      - .env
    depends_on:
      - redis
      - web