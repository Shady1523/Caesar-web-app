services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"

  web:
    build: .
    ports:
      - "8000:8000"
    restart: always
    shm_size: '2gb'
    env_file:
      - .env
    volumes:
      - .:/app
      - ./redis_data:/data
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - redis
    command: daphne -b 0.0.0.0 -p 8000 LCwebsite.asgi:application

  worker:
    build: .
    command: celery -A LCwebsite worker -l info
    env_file:
      - .env
    depends_on:
      - redis
      - web
  
  flower:
    build: .
    container_name: flower
    ports:
      - "5555:5555"
    command: celery -A LCwebsite flower --basic_auth=${FLOWER_USER}:${FLOWER_PASSWORD} --address=0.0.0.0
    working_dir: /app
    environment:
      - PYTHONPATH=/app
    env_file:
      - .env
    depends_on:
      - redis
      - worker